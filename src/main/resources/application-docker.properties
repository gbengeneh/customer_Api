spring.application.name=customer_api
server.port=7074

# ===============================
# # Eureka Client Configuration (Docker)
# # ===============================
# eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
# eureka.client.register-with-eureka=true
# eureka.client.fetch-registry=true
# eureka.instance.prefer-ip-address=true
# eureka.instance.hostname=customer_api

# ===============================
# DATABASE (Docker - PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/niitdevcustomerdb
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.initialize=false

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database=default
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# JSON / Spring Behavior
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false
spring.main.allow-circular-references=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
#==============================
# OpenTelemetry / Jaeger Tracing
#==============================
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
#============================== 
# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# ===============================
# ===============================
# Swagger/OpenAPI
# ===============================
springdoc.api-docs.path=/docs

# ===============================
# Logging
# ===============================
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
